# OpenETL-Go — 默认配置(单节点 ETL 模式)。
#
# 启动: ./openetl-go
# 参数化启动: ./openetl-go --help 查看 CLI flags。优先级为
# CLI flags > 环境变量 > config.yaml > 内置默认值。
# 容器: 挂载到 /app/manifest/config/config.yaml
#
# 结构化日志: 设置环境变量 LOGGER_FORMAT=json(见 internal/logic/app/logging.go)。
# 横向扩展: 把 etl.storage.type 切到 mysql/postgresql,etl.role 切到 master/worker。

server:
  address:     ":8000"
  openapiPath: "/api.json"
  swaggerPath: "/swagger"
  # NOTE: 不要设置 serverRoot。前端 UI 资源已通过 gf pack 嵌入二进制
  # (internal/packed/packed.go → gres)，由 internal/logic/app/app.go 的
  # SetupStaticFiles 通过 gres.Get("resource/public/...") 提供 SPA 服务。
  # 若在此设置 serverRoot，GoFrame 会在启动期校验磁盘上是否存在该目录
  # (SetServerRoot → Fatalf)，导致裸二进制 / 未 COPY resource 的容器无法启动。

# ETL 管道模式:启动后加载 pipes/ 下声明式管道,并对外暴露 /api/v2/*。
etl:
  enabled: true
  address: ":8001"
  # API token 也可通过 ETL_API_TOKEN 或 --api-token 指定；生产必须设置。
  apiToken: ""
  tls:
    cert: ""            # ETL_TLS_CERT / --tls-cert
    key: ""             # ETL_TLS_KEY / --tls-key
  # 进程角色(分布式): standalone(默认,单进程) | master | worker
  # master/worker 要求 storage.type 为 mysql/postgresql(跨进程共享元数据)。
  # 环境变量 ETL_ROLE 覆盖此值。DAG 管道不分片,仅线性 spec 走分布式分发。
  role: "standalone"
  masterURL: ""        # role=worker 时必填,指向 master 的 HTTP API。环境变量 ETL_MASTER_URL。
  workerID: ""         # 可选 worker 标识(默认 worker-<pid>)。环境变量 ETL_WORKER_ID。
  workerSlots: 4       # 单个 worker 进程最大并发分片任务数。
  specsDir: "./pipes"
  checkpointDir: "./data/checkpoint"
  dlqDir: "./data/dlq"
  pluginsDir: "./data/plugins"
  schemasDir: "./data/schemas"
  audit:
    enabled: true       # ETL_AUDIT_ENABLED / --audit-enabled；audit 写入 SQL storage。
  # 存储引擎:pipeline 定义 / checkpoint / DLQ / audit 等元数据持久化。
  # sqlite(默认)- 零依赖单文件,单机部署。
  # mysql / postgresql - 多实例共享元数据(配合 master/worker)。
  storage:
    type: "sqlite"
    sqlite:
      path: "./data/etl.db"
    # mysql:
    #   dsn: "user:password@tcp(host:3306)/etl?parseTime=true"
    # postgresql:
    #   dsn: "postgres://user:password@host:5432/etl?sslmode=disable"
  # Runtime state/cache backend for lookup/enricher cache, deduplicate/window/join
  # state, and future keyed-state/timer capabilities. This is intentionally
  # separate from etl.storage: SQLite/MySQL/PostgreSQL are checkpoint/metadata
  # stores and must not be used as high-frequency cache/state backends.
  state:
    redis:
      addr: ""          # e.g. redis:6379. Env: ETL_STATE_REDIS_ADDR.
      password: ""      # Env: ETL_STATE_REDIS_PASSWORD.
      db: 0             # Env: ETL_STATE_REDIS_DB.
      keyPrefix: "openetl:state"
  alert:
    webhook: ""

# https://goframe.org/docs/core/glog-config
logger:
  level:   "all"
  stdout:  true
  path:    "./logs"
  file:    "openetl-{Y-m-d}.log"
  rotate:  "daily"
  backups: 30
  # 结构化日志(P5-16):设置环境变量 LOGGER_FORMAT=json 即在 stdout 输出 JSON 行
  # (ts/level/msg + trace_id/caller/stack),适配 Loki/ELK/CloudWatch 等日志采集器。
  # handler 在 cmd.Main 启动时安装(internal/logic/app/logging.go)。
  # 未设置时,使用默认文本格式同时写 stdout 与上面的滚动日志文件。
