# https://goframe.org/docs/web/server-config-file-template
server:
  address:     ":8000"
  openapiPath: "/api.json"
  swaggerPath: "/swagger"
  serverRoot: "resource/public"

# ETL 管道模式。开启后启动 pipes/ 下声明式管道，并跳过旧的单 Canal 同步入口。
etl:
  enabled: true
  address: ":8001"
  # 进程角色 (A11-redo 分布式): standalone (默认, 单进程) | master | worker
  # master/worker 要求 storage.type 为 mysql/postgresql (跨进程共享元数据)
  # 环境变量 ETL_ROLE 覆盖此值。DAG 管道不分片, 仅线性 spec 分布式分发。
  role: "standalone"
  # masterURL: role=worker 时必填, 指向 master 的 HTTP API 基址。环境变量 ETL_MASTER_URL。
  masterURL: ""
  # workerID: 可选 worker 标识 (默认 worker-<pid>)。环境变量 ETL_WORKER_ID。
  workerID: ""
  # workerSlots: 单个 worker 进程最大并发分片任务数 (默认 4)。
  workerSlots: 4
  specsDir: "./pipes"
  checkpointDir: "./data/checkpoint"
  dlqDir: "./data/dlq"
  # 存储引擎：pipeline 定义、checkpoint、DLQ、audit 等元数据持久化
  # sqlite (默认) - 零依赖，单文件数据库，适合单机部署
  # mysql - 需提供 DSN，适合多实例共享元数据
  # postgresql - 需提供 DSN，适合多实例共享元数据
  storage:
    type: "sqlite"
    sqlite:
      path: "./data/etl.db"
    # mysql:
    #   dsn: "user:password@tcp(host:3306)/etl?parseTime=true"
    # postgresql:
    #   dsn: "postgres://user:password@host:5432/etl?sslmode=disable"
  alert:
    webhook: ""

# 监控配置
monitor:
  enabled:       true    # 是否启用监控
  historyDays:   30      # 历史数据保留天数
  collectPeriod: 10      # 采集周期(秒)
  maxEvents:     10000   # 内存最大事件数
  maxErrors:     1000    # 内存最大错误数
  # ClickHouse 监控数据存储(可选，留空则仅使用内存)
  clickhouse:
    host:     "${CLICKHOUSE_HOST:-127.0.0.1}"
    port:     ${CLICKHOUSE_PORT:-8124}
    user:     "${CLICKHOUSE_USER:-default}"
    password: "${CLICKHOUSE_PASSWORD:-}"
    database: "${CLICKHOUSE_DATABASE:-sync_monitor}"

# https://goframe.org/docs/core/glog-config
logger:
  level:   "all"
  stdout:  true
  path:    "./logs"
  file:    "sync-{Y-m-d}.log"
  rotate:  "daily"
  backups: 30
  # Change to "json" for structured logging (recommended for production).
  # GoFrame's JSON format includes level, timestamp, message, and caller.
  # Usage: set both stdoutFormat and fileFormat to "json".
  #
  #   stdoutFormat: "json"
  #   fileFormat:   "json"

# 同步源配置
database:
  default:
    # 使用环境变量注入凭据，避免硬编码到仓库
    link: "mysql:${DB_USER:-sync_user}:${DB_PASSWORD:-sync_password_123}@tcp(${DB_HOST:-127.0.0.1}:${DB_PORT:-3306})/${DB_NAME:-dzh3136_go}"
    debug: false

# Canal 配置
canal:
  serverId: 1001
  flavor:   "mysql"
  # 仅增量同步，禁用 mysqldump
  dump: false

# 同步目标配置
sync:
  # 源数据库
  database: "dzh3136_go"
  # 批量大小
  batchSize: 1000
  # 同步目标列表
  targets:
    - name: "clickhouse-main"
      type: "clickhouse"
      tables:
        - "customers"
        - "orders"
        - "products"
      clickhouse:
        host:     "${SYNC_CLICKHOUSE_HOST:-127.0.0.1}"
        port:     ${SYNC_CLICKHOUSE_PORT:-9000}
        user:     "${SYNC_CLICKHOUSE_USER:-default}"
        password: "${SYNC_CLICKHOUSE_PASSWORD:-}"
        database: "${SYNC_CLICKHOUSE_DATABASE:-dzh3136_go}"
      # 定时 OPTIMIZE 清理
      schedule:
        enable:   true
        interval: 1440  # 分钟，1440 = 24小时

    # Elasticsearch 目标 (示例)
