# OpenETL-Go — minimal lightweight config (single-node ETL mode).
#
# Use this instead of config.yaml for a zero-dependency single-node deployment:
#   ./openetl-go -c=manifest/config/config.etl.yaml
#   (or mount it at /app/manifest/config/config.yaml in a container)
#
# This template strips the legacy Canal/sync/database cruft. It boots the ETL
# framework in standalone + SQLite mode — no MySQL/ClickHouse/Redis required to
# start. Pipeline specs under ./pipes reference their own source/sink endpoints.
#
# Structured logging: set env LOGGER_FORMAT=json (see internal/logic/app/logging.go).
# Scale out: switch etl.storage.type to mysql/postgresql and etl.role to master/worker.

server:
  address: ":8000"
  serverRoot: "resource/public"

etl:
  enabled: true
  address: ":8001"
  role: "standalone"          # standalone | master | worker (mysql/postgresql storage)
  specsDir: "./pipes"
  checkpointDir: "./data/checkpoint"
  dlqDir: "./data/dlq"
  storage:
    type: "sqlite"            # zero-dependency single-node; mysql/postgresql to scale out
    sqlite:
      path: "./data/etl.db"
  alert:
    webhook: ""

# Monitoring is in-memory only here (no ClickHouse persistence). Add the
# monitor.clickhouse block from config.yaml if you want historical retention.
monitor:
  enabled: true

logger:
  level: "all"
  stdout: true
  path: "./logs"
  file: "etl-{Y-m-d}.log"
  rotate: "daily"
  backups: 30
