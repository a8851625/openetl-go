# ETL Platform OpenAPI 3.0 Specification
# This file describes the ETL API v2 endpoints. It can be imported into
# Swagger UI, Postman, or any OpenAPI-compatible tool.
# Served at: /api/v2/ (base path)

openapi: 3.0.3
info:
  title: Sync Canal ETL API
  version: "3.0"
  description: |
    Declarative ETL/CDC platform API for pipeline management, monitoring,
    dead-letter queue operations, and plugin management.
    
    ## Authentication
    All endpoints require `X-API-Token` header or `Authorization: Bearer <token>`.
    The token is set via `ETL_API_TOKEN` environment variable.

servers:
  - url: http://localhost:8000/api/v2
    description: Local development
  - url: /api/v2
    description: Same-origin (via reverse proxy)

security:
  - ApiToken: []

components:
  securitySchemes:
    ApiToken:
      type: apiKey
      in: header
      name: X-API-Token
  schemas:
    PipelineSpec:
      type: object
      properties:
        name: { type: string, example: "mysql-to-clickhouse" }
        source: { $ref: '#/components/schemas/PluginConfig' }
        sink: { $ref: '#/components/schemas/PluginConfig' }
        transforms:
          type: array
          items: { $ref: '#/components/schemas/PluginConfig' }
        batch_size: { type: integer, default: 1000 }
        flush_interval_ms: { type: integer, default: 1000 }
        checkpoint_interval_sec: { type: integer, default: 30 }
        parallelism:
          type: object
          properties:
            sharding:
              type: object
              properties:
                strategy: { type: string, enum: [round_robin, pk_mod, hash_modulo, partition, id_range, table] }
                key: { type: string }
                logical_shards: { type: integer }
            execution:
              type: object
              properties:
                max_active_shards: { type: integer }
                transform_workers: { type: integer }
                sink_concurrency: { type: integer }
            count: { type: integer, deprecated: true }
            shard_strategy: { type: string, enum: [round_robin, partition, id_range, table], deprecated: true }
    PluginConfig:
      type: object
      properties:
        type: { type: string, example: "mysql_cdc" }
        config: { type: object }
    PipelineStatus:
      type: object
      properties:
        id: { type: string, description: Pipeline instance UUID }
        name: { type: string }
        status: { type: string, enum: [running, stopped, failed, paused, completed] }
        stats:
          type: object
          properties:
            records_read: { type: integer }
            records_written: { type: integer }
            records_failed: { type: integer }
            records_dlq: { type: integer }
            started_at: { type: string, format: date-time }
            uptime: { type: string }
            last_error: { type: string }
    MetricsResponse:
      type: object
      properties:
        timestamp: { type: string, format: date-time }
        pipelines:
          type: array
          items:
            $ref: '#/components/schemas/PipelineMetrics'
    PipelineMetrics:
      type: object
      properties:
        id: { type: string, description: Pipeline instance UUID }
        name: { type: string }
        status: { type: string }
        records_read: { type: integer, format: int64 }
        records_written: { type: integer, format: int64 }
        records_failed: { type: integer, format: int64 }
        records_dlq: { type: integer, format: int64 }
        state_metrics:
          type: array
          items:
            $ref: '#/components/schemas/StateMetric'
        transform_metrics:
          type: array
          items:
            $ref: '#/components/schemas/TransformMetric'
    StateMetric:
      type: object
      properties:
        node: { type: string, example: "window-orders" }
        keys: { type: integer, example: 7 }
        bytes: { type: integer, format: int64, example: 512 }
        updated_at: { type: string, format: date-time }
    TransformMetric:
      type: object
      properties:
        node: { type: string, example: "join-orders" }
        transform: { type: string, example: "join" }
        counters:
          type: object
          additionalProperties:
            type: integer
            format: int64
          example:
            hit: 10
            miss: 2
            miss_dropped: 1
            miss_dlq: 1

tags:
  - name: Pipelines
  - name: Checkpoints
  - name: DLQ
  - name: Plugins
  - name: Specs
  - name: Connections
  - name: Transforms
  - name: Monitoring
  - name: Audit
  - name: Schemas
  - name: Workers

paths:
  /pipelines:
    get:
      tags: [Pipelines]
      summary: List all pipelines
      responses:
        '200':
          description: Pipeline list
    post:
      tags: [Pipelines]
      summary: Create a new pipeline
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                spec: { $ref: '#/components/schemas/PipelineSpec' }
      responses:
        '200': { description: Created with a generated pipeline instance id }
    put:
      tags: [Pipelines]
      summary: Update an existing pipeline
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                id: { type: string, description: Pipeline instance UUID. If omitted, a single matching legacy name may be used. }
                spec: { $ref: '#/components/schemas/PipelineSpec' }
                reset_checkpoint: { type: boolean }
      responses:
        '200': { description: Updated }

  /pipelines/{id}:
    get:
      tags: [Pipelines]
      summary: Get pipeline status
      description: The path value is the pipeline instance UUID. For backward compatibility, a display name is accepted only when it resolves to one instance.
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
      responses:
        '200':
          description: Pipeline status
    delete:
      tags: [Pipelines]
      summary: Delete pipeline
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
      responses:
        '200': { description: Deleted }

  /pipelines/{id}/start:
    post:
      tags: [Pipelines]
      summary: Start pipeline
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
      responses:
        '200': { description: Started }

  /pipelines/{id}/stop:
    post:
      tags: [Pipelines]
      summary: Stop pipeline
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
      responses:
        '200': { description: Stopped }

  /pipelines/{id}/pause:
    post:
      tags: [Pipelines]
      summary: Pause pipeline (suspend source reading, keep checkpoint)
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
      responses:
        '200': { description: Paused }

  /pipelines/{id}/resume:
    post:
      tags: [Pipelines]
      summary: Resume pipeline from pause
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
      responses:
        '200': { description: Resumed }

  /pipelines/{id}/spec:
    get:
      tags: [Pipelines]
      summary: Get pipeline spec (secrets masked)
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
      responses:
        '200': { description: Spec with masked secrets }

  /pipelines/{id}/schedule:
    get:
      tags: [Pipelines]
      summary: Get pipeline schedule config
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
      responses:
        '200': { description: Schedule config and enabled flag }
    put:
      tags: [Pipelines]
      summary: Create or update pipeline schedule config
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required: [type]
              properties:
                type: { type: string, enum: [streaming, once, cron, periodic, dependency] }
                cron: { type: string, description: Required when type=cron }
                interval_sec: { type: integer, description: Required when type=periodic }
                depends_on:
                  type: array
                  items: { type: string }
                  description: Required when type=dependency; upstream pipeline names/ids this pipeline waits for.
      responses:
        '200': { description: Schedule saved }
    delete:
      tags: [Pipelines]
      summary: Disable pipeline schedule config
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
      responses:
        '200': { description: Schedule disabled }

  /pipelines/{id}/history:
    get:
      tags: [Pipelines]
      summary: Get pipeline run history
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
      responses:
        '200': { description: Run history }

  /pipelines/{id}/log:
    get:
      tags: [Pipelines]
      summary: Get recent pipeline logs
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
        - { name: since, in: query, schema: { type: integer } }
      responses:
        '200': { description: Log entries }

  /pipelines/{id}/shards:
    get:
      tags: [Pipelines]
      summary: Get per-shard stats
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
      responses:
        '200': { description: Shard info }

  /pipelines/{id}/checkpoint/set:
    post:
      tags: [Pipelines, Checkpoints]
      summary: Set checkpoint position or Kafka replay offset
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                position:
                  type: object
                  description: Raw source checkpoint position for backward compatibility.
                source:
                  type: string
                  description: Source type. Use kafka for structured Kafka offset replay.
                source_type:
                  type: string
                  description: Alias for source.
                topic:
                  type: string
                  description: Kafka topic. Optional when the saved pipeline spec is a Kafka source with source.config.topic.
                partition:
                  type: integer
                  description: Kafka partition for single-partition replay.
                offset:
                  type: integer
                  format: int64
                  description: Kafka offset. With default mode=replay_from, replay resumes from this offset.
                offsets:
                  type: object
                  additionalProperties: { type: integer, format: int64 }
                  description: Kafka partition -> offset map. Defaults to last_committed mode unless mode=replay_from is specified.
                replay_from_offsets:
                  type: object
                  additionalProperties: { type: integer, format: int64 }
                  description: Kafka partition -> first offset to replay.
                mode:
                  type: string
                  enum: [replay_from, last_committed]
                  description: replay_from stores offset-1 so the next start reads the requested offset; last_committed stores offsets as-is.
      responses:
        '200': { description: Checkpoint saved }
        '400': { description: Invalid checkpoint request }

  /pipelines/{id}/checkpoint/reset:
    post:
      tags: [Pipelines, Checkpoints]
      summary: Reset checkpoint (start from beginning)
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
      responses:
        '200': { description: Checkpoint reset }

  /metrics:
    get:
      tags: [Monitoring]
      summary: Get JSON metrics for all pipelines
      responses:
        '200':
          description: Metrics JSON
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MetricsResponse'

  /health:
    get:
      tags: [Monitoring]
      summary: Health check (returns 503 if unhealthy)
      security: []
      responses:
        '200': { description: Healthy }
        '503': { description: Unhealthy }

  /dlq/{id}:
    get:
      tags: [DLQ]
      summary: List dead-letter records
      parameters:
        - { name: id, in: path, required: true, schema: { type: string }, description: Pipeline instance UUID; a unique legacy display name is accepted for compatibility. }
        - { name: limit, in: query, schema: { type: integer } }
        - { name: contains, in: query, schema: { type: string } }
      responses:
        '200': { description: DLQ items, including stable id and dag_node when available }
    delete:
      tags: [DLQ]
      summary: Delete DLQ records
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
      responses:
        '200': { description: Deleted }

  /dlq/{id}/replay:
    post:
      tags: [DLQ]
      summary: Replay DLQ records
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
      responses:
        '200': { description: Replayed }
        '400': { description: DAG DLQ replay requires dag_node context on legacy records }

  /dlq/{pipeline_id}/{id}:
    delete:
      tags: [DLQ]
      summary: Delete one DLQ record by stable ID
      parameters:
        - { name: pipeline_id, in: path, required: true, schema: { type: string } }
        - { name: id, in: path, required: true, schema: { type: integer, format: int64 } }
      responses:
        '200': { description: Deleted }

  /dlq/{pipeline_id}/{id}/replay:
    post:
      tags: [DLQ]
      summary: Replay one DLQ record by stable ID
      parameters:
        - { name: pipeline_id, in: path, required: true, schema: { type: string } }
        - { name: id, in: path, required: true, schema: { type: integer, format: int64 } }
      responses:
        '200': { description: Replayed }
        '400': { description: DAG DLQ replay requires dag_node context on legacy records }

  /connections:
    get:
      tags: [Connections]
      summary: List saved reusable connections with secret fields masked
      responses:
        '200': { description: Connection catalog entries }
    post:
      tags: [Connections]
      summary: Create or update a saved reusable connection
      description: Saved connections can be referenced from pipeline source/sink/transform specs and DAG nodes with `connection` or `connection_ref`; inline config overrides saved config.
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required: [name, kind, type, config]
              properties:
                name: { type: string }
                kind: { type: string, enum: [source, sink, transform] }
                type: { type: string }
                config: { type: object }
                test: { type: boolean, default: false }
                open: { type: boolean, default: true }
      responses:
        '200': { description: Saved connection with masked config and optional test result }

  /connections/{name}:
    get:
      tags: [Connections]
      summary: Get a saved connection with secret fields masked
      parameters:
        - { name: name, in: path, required: true, schema: { type: string } }
      responses:
        '200': { description: Connection entry }
        '404': { description: Connection not found }
    put:
      tags: [Connections]
      summary: Update a saved connection
      parameters:
        - { name: name, in: path, required: true, schema: { type: string } }
      responses:
        '200': { description: Saved connection }
    delete:
      tags: [Connections]
      summary: Delete a saved connection
      parameters:
        - { name: name, in: path, required: true, schema: { type: string } }
      responses:
        '200': { description: Deleted }

  /connections/{name}/test:
    post:
      tags: [Connections]
      summary: Test a saved connection and update its health status
      parameters:
        - { name: name, in: path, required: true, schema: { type: string } }
      responses:
        '200': { description: Test result and updated health status }
        '400': { description: Build/open failed }
        '404': { description: Connection not found }

  /connections/{name}/context:
    get:
      tags: [Connections]
      summary: Get saved connection descriptor, health, recommendations, and source/sink introspection
      description: Returns masked connection metadata, connector descriptor, recommended batch/checkpoint/schedule settings, and best-effort metadata such as source database/table/columns, Kafka topics/partitions, file/HTTP sample records, sink target table/index schema, or File/S3 output targets.
      parameters:
        - { name: name, in: path, required: true, schema: { type: string } }
      responses:
        '200': { description: Connection context }
        '404': { description: Connection not found }

  /connections/test:
    post:
      tags: [Connections]
      summary: Test a source/sink connection and optionally get sample records
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                kind: { type: string, enum: [source, sink, transform] }
                type: { type: string }
                config: { type: object }
                open: { type: boolean, default: true }
      responses:
        '200': { description: Test result with optional sample records }

  /connectors/descriptors:
    get:
      tags: [Connectors]
      summary: List Connector Descriptor v1 records merged from registry, config schema, maturity, and readiness metadata
      description: Maturity levels are production, beta, experimental, and dev-only. Each descriptor also includes readiness gates for schema/preflight, checkpoint or replay behavior, and e2e evidence.
      responses:
        '200': { description: Connector descriptors for UI forms, preflight, and connector test kits }

  /ai/context:
    get:
      tags: [AI]
      summary: Get the AI context pack generated from descriptors, schema, component docs, boundaries, and examples
      responses:
        '200': { description: AI context pack }

  /ai/generate:
    post:
      tags: [AI]
      summary: Generate an ordinary pipeline/DAG YAML draft with validation and review metadata
      description: AI generation never starts a pipeline and must still pass validate/preflight and user confirmation.
      responses:
        '200': { description: Generated YAML plus context_pack_version, validation, and review fields }

  /transforms/dry-run:
    post:
      tags: [Transforms]
      summary: Dry-run transforms against a sample record
      description: Returns `record` for backward-compatible single-output callers and `records`/`output_count` for BatchTransform outputs such as flat_map/udtf. Record-level transform failures may be returned in `errors` with `partial_error=true`.
      responses:
        '200': { description: Transformed record or records }

  /specs/validate:
    post:
      tags: [Specs]
      summary: Validate a pipeline spec and return preflight warnings, readiness, and recommendations
      responses:
        '200': { description: Validation result with optional preflight.recommendations config patches }

  /specs/reload:
    post:
      tags: [Specs]
      summary: Reload specs from disk
      responses:
        '200': { description: Reloaded }

  /plugins:
    get:
      tags: [Plugins]
      summary: List registered plugins
      description: Returns built-in connector types, installed WASM plugins, typed schemas, metadata, and the current `plugin_abi` contract (`openetl.plugin.abi/v1`).
      responses:
        '200': { description: Plugin list }

  /plugins/schema:
    get:
      tags: [Plugins]
      summary: Get config field schemas for all plugins
      responses:
        '200': { description: Plugin schemas }

  /plugins/install:
    post:
      tags: [Plugins]
      summary: Install a WASM plugin (multipart upload)
      description: Accepts `wasm`, `name`, `kind`, `version`, and optional text field `manifest`. Explicit Plugin ABI v1 manifests are validated before the WASM file is loaded; legacy uploads without a manifest are reported as `manifest_validated=false`.
      responses:
        '200': { description: Installed }

  /plugins/compile:
    post:
      tags: [Plugins]
      summary: Compile and optionally install a transform plugin from TypeScript source
      description: Bundles TypeScript with pre-installed esbuild, then uses a pre-installed extism-js compiler when available. Accepts optional Plugin ABI v1 `manifest` text field. Server-side npx fallback for extism-js is disabled unless explicitly enabled and configured for a trusted package. Source and sink plugins must be compiled offline and uploaded as `.wasm` through `/plugins/install`.
      responses:
        '200': { description: Compiled and installed, or source returned with offline compile guidance }
        '400': { description: Invalid request, including source/sink compile attempts }

  /plugins/dry-run:
    post:
      tags: [Plugins]
      summary: Dry-run an installed transform plugin against a sample record
      description: Returns `records` and `output_count` for multi-output WASM/plugin transforms. `record` and `output` contain the first output for backward-compatible clients.
      responses:
        '200': { description: Plugin transform dry-run result }

  /schemas:
    get:
      tags: [Schemas]
      summary: List registered data schemas
      responses:
        '200': { description: Schema list }

  /schemas/{name}:
    get:
      tags: [Schemas]
      summary: Get a specific schema
      parameters:
        - { name: name, in: path, required: true, schema: { type: string } }
      responses:
        '200': { description: Schema }

  /workers:
    get:
      tags: [Workers]
      summary: List registered workers
      responses:
        '200': { description: Worker list }

  /audit:
    get:
      tags: [Audit]
      summary: List audit events
      parameters:
        - { name: limit, in: query, schema: { type: integer, default: 50 } }
      responses:
        '200': { description: Audit events }

  /settings:
    get:
      tags: [Settings]
      summary: Get system settings
      responses:
        '200': { description: Settings }
    put:
      tags: [Settings]
      summary: Update system settings
      responses:
        '200': { description: Updated }
