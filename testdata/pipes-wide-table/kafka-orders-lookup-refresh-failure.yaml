name: kafka-orders-lookup-refresh-failure

source:
  type: kafka
  config:
    brokers:
      - host.containers.internal:19092
    topic: orders.lookup_failure
    group_id: openetl-wide-table-lookup-refresh-failure
    initial_offset: oldest

transforms:
  - type: normalize_envelope
    config:
      keep_metadata: true
  - type: lookup
    config:
      dsn: root:root123456@tcp(host.containers.internal:13306)/dzh3136_go?timeout=5s&readTimeout=5s&writeTimeout=5s
      query: SELECT id, tier, region FROM dim_users_missing_for_e2e
      join_key: user_id
      dim_key: id
      fields:
        - tier
        - region
      refresh_interval_sec: 0
      on_refresh_error: error

sink:
  type: clickhouse
  config:
    host: host.containers.internal
    port: 9000
    user: default
    password: dzh123456
    database: wide
    table: lookup_refresh_failure_sink
    auto_create: true
    schema_drift: add_columns
    pk_columns:
      - id
    version_column: _version
