name: "file-to-kafka"
source:
  type: file
  config:
    path: "/app/testdata/files/customers.jsonl"
    format: "json"

transforms:
  - type: identity
    config: {}

sink:
  type: kafka
  config:
    brokers:
      - "host.containers.internal:19092"
    topic: "etl-sink-topic"
    key_column: "id"

batch_size: 3
checkpoint_interval_sec: 1
backpressure_buffer: 10

retry:
  max_attempts: 3
  initial_interval_ms: 100
  max_interval_ms: 1000

dlq:
  enable: true
