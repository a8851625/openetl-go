name: "file-to-clickhouse-autocreate"
source:
  type: file
  config:
    path: "/app/testdata/files/clickhouse_autocreate.jsonl"
    format: "json"

transforms:
  - type: identity
    config: {}

sink:
  type: clickhouse
  config:
    host: "host.docker.internal"
    port: 9000
    user: "default"
    password: "dzh123456"
    database: "dzh3136_go"
    table: "auto_customers"
    pk_columns:
      - "id"
    auto_create: true
    schema_drift: "add_columns"

batch_size: 1
checkpoint_interval_sec: 1
backpressure_buffer: 10

retry:
  max_attempts: 3
  initial_interval_ms: 100
  max_interval_ms: 1000

dlq:
  enable: true
