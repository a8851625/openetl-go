name: "mysql-snapshot-cdc-to-mysql"
source:
  type: mysql_snapshot_cdc
  config:
    host: "host.docker.internal"
    port: 13306
    user: "sync_user"
    password: "sync_password_123"
    database: "dzh3136_go"
    table: "customers"
    pk_column: "id"
    limit: 2
    server_id: 1401

transforms:
  - type: identity
    config: {}

sink:
  type: mysql
  config:
    host: "host.docker.internal"
    port: 13306
    user: "sync_user"
    password: "sync_password_123"
    database: "dzh3136_target"
    table: "customers"
    batch_mode: "upsert"
    pk_columns:
      - "id"

batch_size: 2
checkpoint_interval_sec: 1
backpressure_buffer: 20

retry:
  max_attempts: 3
  initial_interval_ms: 100
  max_interval_ms: 1000

dlq:
  enable: true
