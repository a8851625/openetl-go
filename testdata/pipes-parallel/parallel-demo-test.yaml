name: parallel-demo-test
description: "3-shard demo source -> file sink to validate parallel runner"
source:
  type: demo
  config:
    interval_ms: 50
    fields:
      - { name: value, type: counter }
sink:
  type: file_sink
  config:
    path: /tmp/parallel-demo-${SHARD}.jsonl
    format: json
parallelism:
  sharding:
    strategy: round_robin
    logical_shards: 3
  execution:
    max_active_shards: 3
batch_size: 10
checkpoint_interval_sec: 1
max_records: 30
