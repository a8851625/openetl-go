name: kafka-lookup-state-clickhouse

source:
  type: kafka
  config:
    brokers:
      - host.docker.internal:19092
    topic: orders.lookup_state
    group_id: openetl-lookup-state-clickhouse
    initial_offset: oldest

transforms:
  - type: normalize_envelope
    config:
      keep_metadata: true
  - type: lookup
    config:
      dsn: root:root123456@tcp(host.docker.internal:13306)/dzh3136_go?timeout=5s&readTimeout=5s&writeTimeout=5s
      query: SELECT id, name, tier, region FROM dim_users_lookup_state
      join_key: user_id
      dim_key: id
      fields:
        - name
        - tier
        - region
      refresh_interval_sec: 0
      max_cache_entries: 100000
      on_miss: error
      on_refresh_error: error
      state_backend: sqlite
      state_path: /app/data/lookup-state.db
      state_ttl_seconds: 86400
  - type: rename
    config:
      mappings:
        name: user_name
        tier: user_tier
        region: user_region

sink:
  type: clickhouse
  config:
    host: host.docker.internal
    port: 9000
    user: default
    password: dzh123456
    database: wide
    table: lookup_state_recovery
    auto_create: true
    schema_drift: add_columns
    pk_columns:
      - id
    version_column: _version

batch_size: 1
checkpoint_interval_sec: 1
backpressure_buffer: 10

retry:
  max_attempts: 3
  initial_interval_ms: 1000
  max_interval_ms: 30000

dlq:
  enable: true
