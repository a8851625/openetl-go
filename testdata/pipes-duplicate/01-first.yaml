name: "duplicate-pipeline"
source:
  type: file
  config:
    path: "/app/testdata/files/customers.jsonl"
    format: "json"
sink:
  type: file_sink
  config:
    output_dir: "/app/data/output/duplicate"
    format: "jsonl"
    prefix: "first_"
batch_size: 3
checkpoint_interval_sec: 1
backpressure_buffer: 10
retry:
  max_attempts: 3
  initial_interval_ms: 100
  max_interval_ms: 1000
dlq:
  enable: true
