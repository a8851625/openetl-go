name: "http-to-file"
source:
  type: http
  config:
    name: "http_customers"
    url: "http://host.docker.internal:18080/customers"
    method: "GET"
    headers:
      X-API-Key: "secret-token"
    pagination: "page"
    page_param: "page"
    size_param: "size"
    page_size: 2
    max_pages: 3
    result_key: "items"

transforms:
  - type: identity
    config: {}

sink:
  type: file_sink
  config:
    output_dir: "/app/data/output/http"
    format: "jsonl"
    prefix: "http_customers_"

batch_size: 2
checkpoint_interval_sec: 1
backpressure_buffer: 10

retry:
  max_attempts: 3
  initial_interval_ms: 100
  max_interval_ms: 1000

dlq:
  enable: true
