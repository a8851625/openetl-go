name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
      - name: go vet
        run: go vet ./...

  unit-test:
    name: Unit Tests (-race)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
      - name: Run unit tests
        run: go test -race -count=1 ./internal/etl/... ./internal/logic/...

  integration-test:
    name: Integration Tests
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root123456
          MYSQL_DATABASE: testdb
        ports:
          - 3306:3306
        options: >-
          --health-cmd "mysqladmin ping -h localhost"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      clickhouse:
        image: clickhouse/clickhouse-server:24.3-alpine
        env:
          CLICKHOUSE_USER: default
          CLICKHOUSE_PASSWORD: dzh123456
          CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: 1
        ports:
          - 8123:8123
          - 9000:9000
        options: >-
          --ulimit nofile=262144:262144
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
      - name: Wait for ClickHouse
        run: |
          for i in $(seq 1 180); do
            if curl -fsS http://127.0.0.1:8123/ping >/dev/null 2>&1 || \
               curl -fsS http://default:dzh123456@127.0.0.1:8123/ping >/dev/null 2>&1; then
              exit 0
            fi
            sleep 1
          done

          docker ps -a
          cid="$(docker ps -aq --filter ancestor=clickhouse/clickhouse-server:24.3-alpine | head -n 1)"
          if [ -n "$cid" ]; then
            docker logs "$cid" || true
            docker exec "$cid" sh -c 'tail -200 /var/log/clickhouse-server/clickhouse-server.err.log 2>/dev/null || true'
          fi
          exit 1
      - name: Run integration tests
        env:
          MYSQL_HOST: 127.0.0.1
          MYSQL_PORT: 3306
          MYSQL_USER: root
          MYSQL_PASSWORD: root123456
          MYSQL_DATABASE: testdb
          CLICKHOUSE_HOST: 127.0.0.1
          CLICKHOUSE_PORT: 9000
          CLICKHOUSE_USER: default
          CLICKHOUSE_PASSWORD: dzh123456
        run: go test -race -count=1 -tags=integration ./internal/etl/...
