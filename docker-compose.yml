# OpenETL-Go — Production Standalone (Compose v2)
#
# 一体化生产单机部署：OpenETL-Go + Redis (state) + MySQL (metadata)。
# 覆盖 docs/quickstart.zh.md 的生产部署检查清单：
#   - ETL_API_TOKEN / ETL_SPEC_ENCRYPTION_KEY / TLS / audit / DLQ TTL / 告警
#   - 持久化卷（SQLite 之外的生产元数据 + checkpoint/DLQ）
#   - 资源限制 + 结构化 JSON 日志 + 健康检查 + metrics
#
# 用法：
#   CONTAINER_CLI="${CONTAINER_CLI:-$(command -v podman || command -v docker)}"
#   "$CONTAINER_CLI" compose up -d
#
# 配置优先级：CLI flags > 环境变量 > config.yaml > 内置默认。
# 下面的 environment 区是推荐基线；敏感值请通过 .env 或 -e 覆盖，不要提交。

services:
  # ── Metadata storage (MySQL) ───────────────────────────────────────
  # Pipeline spec / checkpoint / DLQ / audit / worker / plugin 元数据。
  # 切到 PostgreSQL 时改 image 与 etl 的 ETL_STORAGE_TYPE/DSN 即可。
  mysql:
    image: docker.io/library/mysql:8.0
    container_name: openetl-mysql
    restart: unless-stopped
    command: >
      --binlog-format=ROW
      --default-authentication-plugin=mysql_native_password
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-change-me-root}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-openetl}
      MYSQL_USER: ${MYSQL_USER:-openetl}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-change-me}
      TZ: UTC
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysql", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD:-change-me-root}", "-e", "SELECT 1"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 30s
    # 元数据库不直接对外暴露；同 compose 网络内可达。
    # 需要本地调试时取消注释：ports: ["13306:3306"]

  # ── Runtime state/cache backend (Redis) ────────────────────────────
  # lookup/enricher cache、deduplicate/window/join state 的唯一运行时后端。
  # 未配置 Redis 时，依赖缓存/状态的 transform 会在 validate/preflight 阻断。
  redis:
    image: docker.io/library/redis:7-alpine
    container_name: openetl-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes", "--requirepass", "${REDIS_PASSWORD:-change-me}"]
    environment:
      TZ: UTC
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-change-me}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 5s

  # ── OpenETL-Go app ─────────────────────────────────────────────────
  openetl-go:
    # 生产推荐：使用已发布的稳定 tag 镜像，或本地构建：
    #   build: { context: ., dockerfile: Dockerfile }
    image: ${OPENETL_IMAGE:-ghcr.io/a8851625/openetl-go:latest}
    container_name: openetl-go
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8000:8000"   # Web UI + 代理后的 /api/v2/* 与 /metrics
      # - "8001:8001" # ETL API 直连端口；生产建议只暴露 8000，8001 留在内部网络
    environment:
      TZ: ${TZ:-Asia/Shanghai}

      # ── 必改：API 与加密 ─────────────────────────────────────────
      # 强烈建议通过 .env 注入；这里留空仅用于首次启动演示。
      ETL_API_TOKEN: ${ETL_API_TOKEN:-}
      ETL_SPEC_ENCRYPTION_KEY: ${ETL_SPEC_ENCRYPTION_KEY:-}

      # ── Storage：MySQL 元数据（生产推荐，替代 SQLite）─────────────
      ETL_STORAGE_TYPE: mysql
      ETL_STORAGE_DSN: "${MYSQL_USER:-openetl}:${MYSQL_PASSWORD:-change-me}@tcp(mysql:3306)/${MYSQL_DATABASE:-openetl}?parseTime=true&loc=UTC"

      # ── State backend：Redis ─────────────────────────────────────
      ETL_STATE_REDIS_ADDR: redis:6379
      ETL_STATE_REDIS_PASSWORD: ${REDIS_PASSWORD:-change-me}
      ETL_STATE_REDIS_DB: "0"

      # ── Audit 与日志 ─────────────────────────────────────────────
      ETL_AUDIT_ENABLED: "true"
      LOGGER_FORMAT: json   # 适配 Loki/ELK/CloudWatch

      # ── DLQ retention ────────────────────────────────────────────
      ETL_DLQ_TTL: ${ETL_DLQ_TTL:-168h}

      # ── TLS（可选，启用后 8001 走 HTTPS）─────────────────────────
      # ETL_TLS_CERT: /app/certs/tls.crt
      # ETL_TLS_KEY:  /app/certs/tls.key

      # ── 告警 webhook（可选）──────────────────────────────────────
      # ALERT_DINGTALK_WEBHOOK: ${ALERT_DINGTALK_WEBHOOK:-}
      # ALERT_FEISHU_WEBHOOK:   ${ALERT_FEISHU_WEBHOOK:-}
      # ALERT_SLACK_WEBHOOK:    ${ALERT_SLACK_WEBHOOK:-}

      # ── 角色：默认 standalone ────────────────────────────────────
      # 分布式部署见 docker-compose.distributed.yml。
      ETL_ROLE: standalone
    volumes:
      # 持久化数据目录：checkpoint、DLQ 文件、下载的插件、schema 缓存
      - openetl-data:/app/data
      # 声明式 pipeline specs（只读）
      - ./pipes:/app/pipes:ro
      # 日志（结构化 JSON 同时输出到 stdout）
      - openetl-logs:/app/logs
      # 覆盖内嵌默认 config.yaml（可选；上面 env 已足够，挂载仅作高级覆盖）
      # - ./config.yaml:/app/manifest/config/config.yaml:ro
      # TLS 证书挂载点（启用 ETL_TLS_* 时使用）
      # - ./certs:/app/certs:ro
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8000/api/v2/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    deploy:
      resources:
        limits:
          cpus: "${OPENETL_CPU_LIMIT:-2.0}"
          memory: ${OPENETL_MEM_LIMIT:-2g}
        reservations:
          cpus: "0.5"
          memory: 256m
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"

volumes:
  mysql-data:
  redis-data:
  openetl-data:
  openetl-logs:
