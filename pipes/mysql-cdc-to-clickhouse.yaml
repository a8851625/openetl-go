name: mysql-cdc-to-clickhouse
tags: [cdc, clickhouse, canonical]

# Canonical example: MySQL binlog CDC -> ClickHouse (SPEC §1.3).
# Hostnames match docker-compose.dev.yml service names (mysql-source, clickhouse).
# Adjust host/port/credentials for your deployment.

source:
  type: mysql_cdc
  config:
    host: mysql-source
    port: 3306
    user: sync_user
    password: sync_password_123
    server_id: 100
    database: dzh3136_go
    tables: [customers, orders, products]

sink:
  type: clickhouse
  config:
    host: clickhouse
    port: 9000
    user: default
    password: ""
    database: dzh3136_go
    auto_create: true
    schema_drift: add_columns
    batch_size: 500

batch_size: 500
checkpoint_interval_sec: 10

restart_policy:
  mode: on-failure
  max_restarts: 5
  initial_delay_ms: 5000
  max_delay_ms: 60000
