name: mysql-batch-to-clickhouse
tags: [quickstart, batch]

# Source: MySQL batch — one-shot full-table extract.
# 适合全量回填；CDC 增量同步见 mysql-to-clickhouse.yaml。
source:
  type: mysql_batch
  config:
    host: quickstart-mysql
    port: 3306
    user: root
    password: root123
    database: dzh3136_go
    table: customers
    pk_column: id            # 用于分片和断点续传
    batch_size: 500

# Sink: ClickHouse — auto-creates tables with ReplacingMergeTree dedup.
# 同一批次重放（如 checkpoint reset）会被 _version 列吸收重复。
sink:
  type: clickhouse
  config:
    host: quickstart-clickhouse
    port: 8123
    protocol: http
    user: default
    password: "clickhouse"
    database: dzh3136_go
    table: customers_batch
    pk_columns: [id]
    version_column: _version
    auto_create: true
    batch_size: 500

batch_size: 500
checkpoint_interval_sec: 10
backpressure_buffer: 100

restart_policy:
  mode: on-failure
  max_restarts: 5
  initial_delay_ms: 5000
  max_delay_ms: 60000
